- className: com.ruoyi.common.importexport.example.ExampleDTO
  fieldName: age
  expression: "age >= 0 && age <= 199"
  message: "[SpEL] 年龄必须在0-199之间"
- className: com.ruoyi.common.importexport.example.ExampleDTO
  fieldName: detail
  expression: "detail != null && detail.description != null && detail.description.length() <= 100"
  message: "[SpEL] 详细描述不能为空且长度不能超过100"
- className: com.ruoyi.common.importexport.example.ExampleDTO
  fieldName: username
  expression: "username == null || username == '' || (username.length() >= 2 && username.length() <= 20)"
  message: "[SpEL] 用户名长度必须在2到20个字符之间"
- className: com.ruoyi.common.importexport.example.ExampleDTO
  fieldName: username
  expression: "username == null || username == '' || username matches '^[a-zA-Z0-9_]+$'"
  message: "[SpEL] 用户名只能包含字母、数字和下划线"
