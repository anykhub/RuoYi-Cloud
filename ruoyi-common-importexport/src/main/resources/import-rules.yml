- className: com.ruoyi.common.importexport.example.ExampleDTO
  fieldName: remark
  required: false
  regex: "^[a-zA-Z0-9_\\u4e00-\\u9fa5]+$"
  message: "备注只能包含字母、数字、下划线和汉字"
- className: com.ruoyi.common.importexport.example.ExampleDTO
  fieldName: age
  required: true
  regex: "^(1[0-9]{2}|[1-9][0-9]?|0)$"
  message: "年龄必须在0-199之间"
- className: com.ruoyi.common.importexport.example.ExampleDTO
  fieldName: detail.description
  required: true
  regex: "^.{1,100}$"
  message: "详细描述不能为空且长度不能超过100"
